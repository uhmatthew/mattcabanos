<!DOCTYPE html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link rel="stylesheet" href="./styles.css">

</head>
<body>

<div class="container">

  <h1>📊 Life Dashboard</h1>

  <!-- Tabs -->
  <div class="tabs">
    <button onclick="showTab('schedule')">Schedule</button>
    <button onclick="showTab('tracker')">Debt</button>
  </div>

  <!-- Schedule Tab -->
  <div id="schedule" class="tab active">
    <h2>10 Week Schedule</h2>
    <div id="calendar"></div>
  </div>
  <h3>Attendance: <span id="attendancePercent">0%</span></h3>

  <!-- Debt Tab -->
  <div id="tracker" class="tab">
    <div class="card">
      <h2>Debt Tracker</h2>

      <input type="number" id="paymentInput" placeholder="Enter payment">
      <button onclick="addPayment()">Add Payment</button>
      <button onclick="resetTracker()" style="background: #ef4444; margin-top: 10px;">
  Reset Tracker
</button>

      <div class="stats">
        <p>Total Paid: $<span id="total">0</span></p>
        <p>Remaining: $<span id="remaining">3600</span></p>
      </div>

      <div id="barContainer">
        <div id="progressBar"></div>
      </div>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
